<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Actions Test Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="theme-controls">
            <span class="mode-label">Light ☀️</span>
            <button id="theme-toggle" class="toggle-switch">
                <div class="toggle-circle"></div>
            </button>
            <span class="mode-label">Dark 🌙</span>
        </div>
    </div>

    <div class="container">
        <h1 id="header">GitHub Actions Status: <span>Checking...</span></h1>
        <p>Testing local environment and CI/CD pipeline.</p>
        <p>This is harikrishna's work</p>
        <div class="counter-section">
            <h2>Interactive Counter</h2>
            <p id="counter-value">0</p>
            <button id="increment-btn">Increment</button>
        </div>
        <br>
        <a href="https://fir-lab2-daeae.web.app/">Firebase Site</a>
    </div>

    

<script>
    // Call the Netlify function — same domain, no CORS issues
    fetch('/.netlify/functions/get_visitors')
        .then(response => response.json())  // parse the JSON response
        .then(visitors => {
            const list = document.getElementById('visitor-list');
            visitors.forEach(v => {
                const item = document.createElement('li');
                item.textContent = v.name + ' — ' + v.visited_at;
                list.appendChild(item);
            });
        })
        .catch(err => console.error('Function call failed:', err));
</script>
   
    <script src="script.js"></script>
</body>
</html>
